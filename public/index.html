<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Physiotherapy Patient Registration System</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🏥 Physiotherapy Patient Registration System</h1>

<p class="subtitle">
Register Patient & Manage Physiotherapy Records
</p>

<form id="patientForm">

<!-- ========================= -->
<!-- PATIENT DETAILS -->
<!-- ========================= -->

<div class="section">

<h2>Patient Details</h2>

<div class="grid">

<div class="inputBox">
<label>Name <span>*</span></label>
<input type="text" id="name" required>
</div>

<div class="inputBox">
<label>Gender <span>*</span></label>

<select id="gender" required>

<option value="">Select</option>
<option>Male</option>
<option>Female</option>
<option>Other</option>

</select>

</div>

<div class="inputBox">
<label>Date of Birth <span>*</span></label>
<input type="date" id="dob" required>
</div>

<div class="inputBox">
<label>Age <span>*</span></label>
<input type="number" id="age" readonly>
</div>

<div class="inputBox">
<label>Occupation</label>
<input type="text" id="occupation">
</div>

<div class="inputBox">
<label>Contact Number</label>
<input
type="tel"
id="contact"
maxlength="10"
placeholder="10 digit mobile number">
</div>

<div class="inputBox full">

<label>Address <span>*</span></label>

<textarea
id="address"
rows="2"
required></textarea>

</div>

</div>

</div>

<!-- ========================= -->
<!-- MEDICAL DETAILS -->
<!-- ========================= -->

<div class="section">

<h2>Medical Details</h2>

<div class="grid">

<div class="inputBox full">

<label>Past Medical History</label>

<textarea
id="history"
rows="3"></textarea>

</div>

<div class="inputBox full">

<label>Problem Description <span>*</span></label>

<textarea
id="problem"
rows="3"
required></textarea>

</div>

<div class="inputBox">

<label>VAS Score (0-10)</label>

<input
type="number"
id="vas"
min="0"
max="10">

</div>

<div class="inputBox full">

<label>Observation</label>

<textarea
id="observation"
rows="3"></textarea>

</div>

<div class="inputBox full">

<label>Diagnosis</label>

<textarea
id="diagnosis"
rows="3"></textarea>

</div>

</div>

</div>

<!-- ========================= -->
<!-- TREATMENT -->
<!-- ========================= -->

<div class="section">

<h2>Treatment Details</h2>

<div class="grid">

<div class="inputBox full">

<label>Treatment Plan <span>*</span></label>

<textarea
id="treatment"
rows="3"
required></textarea>

</div>

<div class="inputBox">

<label>Number of Visits</label>

<input
type="number"
id="visits"
min="1">

</div>

<div class="inputBox">

<label>VAS Score Review (0-10)</label>

<input
type="number"
id="vasReview"
min="0"
max="10">

</div>

</div>

</div>

<!-- ========================= -->
<!-- APPOINTMENT -->
<!-- ========================= -->

<div class="section">

<h2>Appointment Details</h2>

<div class="grid">

<div class="inputBox">

<label>Appointment Date <span>*</span></label>

<input
type="date"
id="appointmentDate"
required>

</div>

<div class="inputBox">

<label>Appointment Time <span>*</span></label>

<select id="appointmentTime" required>

<option value="">Select Appointment Time</option>

<option>09:00</option>
<option>09:30</option>

<option>10:00</option>
<option>10:30</option>

<option>11:00</option>
<option>11:30</option>

<option>12:00</option>
<option>12:30</option>

<option>16:00</option>
<option>16:30</option>

<option>17:00</option>
<option>17:30</option>

<option>18:00</option>
<option>18:30</option>

</select>

</div>

<div class="inputBox full">

<label>Referring Doctor</label>

<input
type="text"
id="doctor">

</div>

<div class="inputBox full">

<label>Remarks</label>

<textarea
id="remarks"
rows="3"></textarea>

</div>

</div>

</div>

<div id="message"></div>

<div class="buttonGroup">

<button type="submit">

Register Patient

</button>

<button
type="button"
onclick="viewPatients()">

View Patients

</button>

<button
type="button"
onclick="downloadReport()">

Download Excel Report

</button>

</div>

</form>

<!-- ========================= -->
<!-- PATIENT TABLE -->
<!-- ========================= -->

<div
id="patientList"
style="display:none;">

<h2>

Registered Patients

</h2>

<div class="tableResponsive">

<table>

<thead>

<tr>

<th>Patient ID</th>

<th>Name</th>

<th>Gender</th>

<th>Age</th>

<th>Contact</th>

<th>Problem</th>

<th>Treatment</th>

<th>Appointment</th>

<th>Time</th>

<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

</div>

<script src="script.js"></script>
<script type="module" src="firebase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>


</body>

</html>
